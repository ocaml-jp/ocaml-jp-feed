name: poll-feeds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      replay:
        description: "Re-post the last N entries from each feed (for testing). Leave blank for normal polling."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: rss-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run poller
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPLAY_LAST: ${{ inputs.replay }}
        run: uv run poll.py

      - name: Commit state changes
        run: |
          if [ ! -d state ]; then
            echo "No state directory; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
            exit 0
          fi
          git commit -m "Update feed state"
          git push
